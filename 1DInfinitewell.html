<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>一维无穷深势阱：相位一致性可视化</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML"></script>
    <style>
        body { font-family: 'PingFang SC', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { display: flex; max-width: 1200px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        #plot { flex: 2; height: 600px; }
        .sidebar { flex: 1; padding: 25px; border-left: 1px solid #eee; background: #fafafa; }
        .card { background: white; padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 20px; }
        h3 { margin-top: 0; color: #1a73e8; font-size: 1.1em; }
        .radio-box { display: flex; gap: 10px; margin: 10px 0; }
        .radio-box label { flex: 1; padding: 8px; text-align: center; background: #eee; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
        .radio-box input:checked + label { background: #1a73e8; color: white; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        .formula-text { font-family: 'Times New Roman', serif; background: #f8f9fa; padding: 10px; border-radius: 4px; border-left: 4px solid #1a73e8; }
    </style>
</head>
<body>

<div class="container">
    <div id="plot"></div>
    
    <div class="sidebar">
        <h3>坐标系选择</h3>
        <div class="radio-box">
            <input type="radio" id="o-left" name="origin" value="left" checked hidden>
            <label for="o-left">左壁为原点 (x=0)</label>
            <input type="radio" id="o-mid" name="origin" value="center" hidden>
            <label for="o-mid">中心为原点 (x'=0)</label>
        </div>

        <div class="card">
            <h3>量子数 $n = <span id="n-txt">1</span>$</h3>
            <input type="range" id="n-slider" min="1" max="10" value="2">
            <p id="parity-info" style="font-weight: bold; color: #555;"></p>
        </div>

        <div class="card">
            <h3>本征函数 $\psi_n$</h3>
            <div id="math-box" class="formula-text"></div>
            <p style="font-size: 0.85em; color: #777; margin-top: 10px;">
                * 注意：为了保证 $n=2$ 时相位一致，中心原点坐标系下引入了相位补偿 $(-1)^{(n-1)/2}$。
            </p>
        </div>

        <div class="card">
            <h3>能量本征值</h3>
            <div class="formula-text"> $E_n = <span id="e-txt">4</span> E_1$ </div>
        </div>
    </div>
</div>

<script>
    const nSlider = document.getElementById('n-slider');
    const radios = document.getElementsByName('origin');
    const mathBox = document.getElementById('math-box');

    function update() {
        const n = parseInt(nSlider.value);
        let isCenter = false;
        for(let r of radios) if(r.checked && r.value === 'center') isCenter = true;

        const a = 1.0;
        const x = [], psi = [], prob = [];
        let formula = "";

        // 核心逻辑：相位补偿
        // 在中心坐标系下，为了与左壁坐标系 psi = sin(n pi x / a) 保持一致：
        // 奇数项用 cos 但符号由 (-1)^((n-1)/2) 决定
        // 偶数项用 sin 但符号由 (-1)^(n/2 - 1) 决定
        
        if (!isCenter) {
            formula = `$$\\sqrt{\\frac{2}{a}} \\sin\\left(\\frac{${n}\\pi x}{a}\\right)$$`;
            for (let i = 0; i <= 500; i++) {
                let xi = (i / 500) * 1.4 - 0.2;
                x.push(xi);
                if (xi >= 0 && xi <= a) {
                    let v = Math.sqrt(2/a) * Math.sin(n * Math.PI * xi / a);
                    psi.push(v); prob.push(v*v);
                } else { psi.push(0); prob.push(0); }
            }
        } else {
            // 中心原点：相位对齐处理
            const phase = (n % 2 !== 0) ? Math.pow(-1, (n-1)/2) : Math.pow(-1, (n/2)-1);
            const funcName = (n % 2 !== 0) ? "\\cos" : "\\sin";
            const signStr = phase < 0 ? "-" : "";
            formula = `$$${signStr}\\sqrt{\\frac{2}{a}} ${funcName}\\left(\\frac{${n}\\pi x'}{a}\\right)$$`;
            
            for (let i = 0; i <= 500; i++) {
                let xi = (i / 500) * 1.4 - 0.7;
                x.push(xi);
                if (xi >= -a/2 && xi <= a/2) {
                    let v;
                    if (n % 2 !== 0) {
                        v = phase * Math.sqrt(2/a) * Math.cos(n * Math.PI * xi / a);
                    } else {
                        v = phase * Math.sqrt(2/a) * Math.sin(n * Math.PI * xi / a);
                    }
                    psi.push(v); prob.push(v*v);
                } else { psi.push(0); prob.push(0); }
            }
        }

        document.getElementById('n-txt').innerText = n;
        document.getElementById('e-txt').innerText = n * n;
        document.getElementById('parity-info').innerText = (n % 2 !== 0) ? "宇称：正 (Even Parity)" : "宇称：负 (Odd Parity)";
        
        mathBox.innerHTML = formula;
        MathJax.Hub.Queue(["Typeset", MathJax.Hub, mathBox]);

        const trace1 = { x: x, y: psi, name: '波函数 ψ', line: {color: '#1a73e8', width: 3} };
        const trace2 = { x: x, y: prob, name: '概率密度 |ψ|²', line: {color: '#d93025', dash: 'dot'} };
        
        const layout = {
            title: `一维无穷深势阱 (n=${n})`,
            xaxis: { range: isCenter ? [-0.8, 0.8] : [-0.3, 1.3], title: isCenter ? "x' (中心原点)" : "x (左壁原点)" },
            yaxis: { range: [-1.6, 2.2] },
            shapes: [
                { type: 'line', x0: isCenter?-0.5:0, y0: -1.5, x1: isCenter?-0.5:0, y1: 2, line: {color: '#333', width: 2} },
                { type: 'line', x0: isCenter?0.5:1, y0: -1.5, x1: isCenter?0.5:1, y1: 2, line: {color: '#333', width: 2} }
            ]
        };
        Plotly.newPlot('plot', [trace1, trace2], layout);
    }

    nSlider.oninput = update;
    radios.forEach(r => r.onchange = update);
    window.onload = update;
</script>

</body>
</html>
