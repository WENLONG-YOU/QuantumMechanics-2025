<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子谐振子：带能级标注</title>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 MathJax -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 20px;
        }
        .chart-section {
            margin-bottom: 30px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #444;
            padding-left: 10px;
            border-left: 4px solid var(--primary-color);
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f8f9fa;
            padding: 15px 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }
        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
        }
        .val-badge {
            font-family: monospace;
            background: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }
        .formula-box {
            text-align: center;
            padding: 15px;
            background: #f1f3f5;
            border-radius: 6px;
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 20px;
            border: 1px solid #e1e4e8;
        }
        .chart-container {
            position: relative;
            height: 450px;
            width: 100%;
        }
        .dual-chart-container {
            display: flex;
            gap: 20px;
        }
        .dual-chart-container .chart-wrapper {
            flex: 1;
            height: 450px;
        }
        @media (max-width: 768px) {
            .dual-chart-container {
                flex-direction: column;
            }
            .dual-chart-container .chart-wrapper {
                height: 350px;
            }
        }
        /* 新增：用于显示能级信息的图例 */
        .energy-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
            font-size: 0.9em;
        }
        .energy-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .color-box {
            width: 15px;
            height: 15px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>一维量子谐振子</h2>
        
        <!-- 交互控制区 -->
        <div class="controls">
            <label for="nSlider"><strong>选择量子数 n:</strong></label>
            <input type="range" id="nSlider" min="0" max="7" value="0" oninput="updateCharts()">
            <span class="val-badge" id="nDisplay">0</span>
        </div>
        
        <!-- 修改了这里的公式，加入了 \hbar\omega -->
        <div class="formula-box" id="mathFormula">
            $$ E_n = (n + \frac{1}{2})\hbar\omega $$
        </div>

        <!-- 上图：特定能级详情 -->
        <div class="chart-section">
            <div class="chart-title">详情分析：\(\psi_n(x)\) 与 \(|\psi_n(x)|^2\)</div>
            <div class="dual-chart-container">
                <div class="chart-wrapper">
                    <canvas id="wavefunctionChart"></canvas>
                </div>
                <div class="chart-wrapper">
                    <canvas id="probabilityChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 下图：所有能级概览 -->
        <div class="chart-section">
            <div class="chart-title">能级概览：\(\psi_n(x)\) (n=0 到 7)</div>
            <div class="chart-container">
                <canvas id="overviewChart"></canvas>
            </div>
            <!-- 新增：能级信息图例 -->
            <div class="energy-legend" id="energyLegend"></div>
        </div>
    </div>

    <script>
        // --- 数学核心 ---
        function factorial(n) {
            return (n <= 1) ? 1 : n * factorial(n - 1);
        }

        function hermitePoly(n, x) {
            if (n === 0) return 1;
            if (n === 1) return 2 * x;
            let h0 = 1, h1 = 2 * x, h2;
            for (let i = 2; i <= n; i++) {
                h2 = 2 * x * h1 - 2 * (i - 1) * h0;
                h0 = h1;
                h1 = h2;
            }
            return h1;
        }

        function waveFunction(n, x) {
            const norm = 1 / Math.sqrt(Math.pow(2, n) * factorial(n) * Math.sqrt(Math.PI));
            return norm * Math.exp(-x * x / 2) * hermitePoly(n, x);
        }

        // --- 颜色配置 ---
        const colors = [
            'rgba(52, 152, 219, 0.6)', // 蓝
            'rgba(155, 89, 182, 0.6)', // 紫
            'rgba(46, 204, 113, 0.6)', // 绿
            'rgba(241, 196, 15, 0.6)', // 黄
            'rgba(230, 126, 34, 0.6)', // 橙
            'rgba(231, 76, 60, 0.6)', // 红
            'rgba(26, 188, 156, 0.6)', // 青
            'rgba(149, 165, 166, 0.6)' // 灰
        ];
        const borderColors = colors.map(c => c.replace('0.6', '1'));

        // --- 图表初始化 ---
        const xVals = [];
        for(let i = -500; i <= 500; i++) xVals.push(i / 100);
        
        let chartWF, chartPD, chartOverview;

        function initCharts() {
            // 1. 上图左：波函数
            chartWF = new Chart(document.getElementById('wavefunctionChart'), {
                type: 'line',
                data: { labels: xVals, datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        x: { title: { display: true, text: '位置 x' }, grid: { color: '#f0f0f0' } },
                        y: { title: { display: true, text: '波函数 ψ' }, grid: { color: '#f0f0f0' } }
                    },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });

            // 2. 上图右：概率密度
            chartPD = new Chart(document.getElementById('probabilityChart'), {
                type: 'line',
                data: { labels: xVals, datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        x: { title: { display: true, text: '位置 x' }, grid: { color: '#f0f0f0' } },
                        y: { title: { display: true, text: '概率密度 |ψ|²' }, grid: { color: '#f0f0f0' } }
                    },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });

            // 3. 下图：概览
            chartOverview = new Chart(document.getElementById('overviewChart'), {
                type: 'line',
                data: { labels: xVals, datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        x: { display: false },
                        y: { min: -0.5, max: 9, grid: { color: '#f0f0f0' } }
                    },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }

        function updateCharts() {
            const n = parseInt(document.getElementById('nSlider').value);
            document.getElementById('nDisplay').innerText = n;

            // 1. 修改顶部公式：明确写出 \hbar\omega
            const formula = `$$ E_n = (n + \\frac{1}{2})\\hbar\\omega, \\quad \\text{当前选中: } n=${n} $$`;
            document.getElementById('mathFormula').innerHTML = formula;
            MathJax.typesetPromise();

            const E_n = n + 0.5;
            const potData = xVals.map(x => 0.5 * x * x);

            // --- 更新上图左：波函数 ---
            const wfData = xVals.map(x => waveFunction(n, x));
            chartWF.data.datasets = [{
                data: wfData,
                borderColor: borderColors[n],
                backgroundColor: colors[n],
                borderWidth: 2,
                pointRadius: 0,
                fill: true,
                tension: 0.4
            }];
            chartWF.update();

            // --- 更新上图右：概率密度 ---
            const pdData = xVals.map(x => {
                const psi = waveFunction(n, x);
                return psi * psi;
            });
            chartPD.data.datasets = [{
                data: pdData,
                borderColor: borderColors[n],
                backgroundColor: colors[n],
                borderWidth: 2,
                pointRadius: 0,
                fill: true,
                tension: 0.4
            }];
            chartPD.update();

            // --- 更新下图：能级概览 ---
            const overviewDatasets = [];
            
            // 势场背景
            overviewDatasets.push({
                data: potData,
                borderColor: '#bdc3c7',
                borderWidth: 1,
                borderDash: [5, 5],
                pointRadius: 0,
                fill: false,
                order: 10
            });

            // 循环生成 n=0 到 7
            for (let i = 0; i <= 7; i++) {
                const currentE = i + 0.5;
                const dataPoints = xVals.map(x => {
                    return currentE + waveFunction(i, x) * 0.35;
                });
                
                // 修改了 Dataset 的 Label，加入了 \hbar\omega
                overviewDatasets.push({
                    data: dataPoints,
                    label: `n=${i}, E=(${i}+½)\\hbar\\omega`, 
                    borderColor: borderColors[i],
                    backgroundColor: colors[i],
                    borderWidth: 1.5,
                    pointRadius: 0,
                    fill: '+1',
                    tension: 0.4
                });
                
                // 基准线
                const baseline = xVals.map(() => currentE);
                overviewDatasets.push({
                    data: baseline,
                    borderWidth: 0,
                    pointRadius: 0,
                    fill: false
                });
            }
            chartOverview.data.datasets = overviewDatasets;
            chartOverview.update();

            // --- 更新下方的能级图例 ---
            updateEnergyLegend();
        }

        // --- 新增函数：生成并更新能级图例 ---
        function updateEnergyLegend() {
            const legendContainer = document.getElementById('energyLegend');
            legendContainer.innerHTML = ''; // 清空旧内容
            
            // 2. 修改图例文本：明确写出 \hbar\omega
            for (let i = 0; i <= 7; i++) {
                const currentE = i + 0.5;
                const itemDiv = document.createElement('div');
                itemDiv.className = 'energy-item';
                
                const colorBox = document.createElement('div');
                colorBox.className = 'color-box';
                colorBox.style.backgroundColor = borderColors[i]; // 使用边框颜色
                
                // 显示为 E=(n+1/2)ħω 的形式
                const textSpan = document.createElement('span');
                textSpan.textContent = `n=${i}, E=(${i}+½)ħω`; 
                
                itemDiv.appendChild(colorBox);
                itemDiv.appendChild(textSpan);
                legendContainer.appendChild(itemDiv);
            }
        }

        // 初始化运行
        initCharts();
        updateCharts(); // 初始时也需要调用一次来生成图例
    </script>
</body>
</html>
