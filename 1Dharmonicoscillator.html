<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子谐振子演示</title>
    
    <!-- 引入 Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 1000px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f2f5;
            border-radius: 8px;
        }
        input[type=range] {
            width: 300px;
            cursor: pointer;
        }
        .value-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: #d32f2f;
            min-width: 150px;
        }
        #plot-container {
            width: 100%;
            height: 600px;
        }
        .info {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>一维量子谐振子 (1D Quantum Harmonic Oscillator)</h1>
    
    <div class="controls">
        <label for="n-slider">量子数 n:</label>
        <input type="range" id="n-slider" min="0" max="20" value="0" step="1">
        <div class="value-display" id="n-value">n = 0</div>
    </div>

    <div id="plot-container"></div>
    <div class="info">拖动滑块改变能级，观察波函数节点数量的变化。</div>
</div>

<script>
    // --- 数学计算部分 ---

    // 厄米多项式 H_n(x)
    function hermite(n, x) {
        if (n === 0) return 1;
        if (n === 1) return 2 * x;
        
        let h0 = 1;
        let h1 = 2 * x;
        let h2;
        
        for (let i = 2; i <= n; i++) {
            h2 = 2 * x * h1 - 2 * (i - 1) * h0;
            h0 = h1;
            h1 = h2;
        }
        return h1;
    }

    // 计算波函数 psi_n(x)
    // 为了绘图美观，这里省略了复杂的归一化常数，只保留函数形态
    // psi ~ H_n(x) * exp(-x^2/2)
    function calculatePsi(n, x) {
        const h = hermite(n, x);
        const exp = Math.exp(-x * x / 2);
        return h * exp;
    }

    // --- 绘图配置与逻辑 ---

    const xMin = -6;
    const xMax = 6;
    const numPoints = 1000;
    
    // 生成 X 轴数据
    const xVals = [];
    for (let i = 0; i <= numPoints; i++) {
        xVals.push(xMin + (xMax - xMin) * i / numPoints);
    }

    // 初始化 Plotly
    const plotDiv = document.getElementById('plot-container');

    function updatePlot(n) {
        // 计算 Y 轴数据
        const yPsi = xVals.map(x => calculatePsi(n, x));
        const yProb = xVals.map(x => Math.pow(calculatePsi(n, x), 2));

        // 1. 波函数曲线 (红色)
        const tracePsi = {
            x: xVals,
            y: yPsi,
            mode: 'lines',
            name: '波函数 ψ<sub>n</sub>(x)',
            line: { color: 'rgba(255, 0, 0, 0.8)', width: 3 }
        };

        // 2. 概率密度曲线 (蓝色填充)
        const traceProb = {
            x: xVals,
            y: yProb,
            mode: 'lines',
            name: '概率密度 |ψ<sub>n</sub>(x)|<sup>2</sup>',
            fill: 'tozeroy',
            line: { color: 'rgba(0, 0, 255, 0.6)', width: 2 },
            fillcolor: 'rgba(0, 0, 255, 0.2)'
        };

        // 3. 势能曲线 V(x) = x^2 (作为背景参考)
        const yPot = xVals.map(x => 2 * x * x); // 放大系数以便观察
        const tracePot = {
            x: xVals,
            y: yPot,
            mode: 'lines',
            name: '势能 V(x)',
            line: { color: 'rgba(0, 0, 0, 0.2)', width: 2, dash: 'dash' },
            hoverinfo: 'skip'
        };

        // 布局设置
        const layout = {
            title: `谐振子能级 n = ${n}`,
            xaxis: { title: '归一化位置 x', range: [xMin, xMax] },
            yaxis: { title: '振幅 / 概率', range: [-2, 12] },
            hovermode: 'x unified',
            showlegend: true,
            legend: { x: 0.02, y: 0.98 }
        };

        const config = { responsive: true };

        Plotly.react(plotDiv, [tracePsi, traceProb, tracePot], layout, config);
    }

    // --- 事件监听 ---

    const slider = document.getElementById('n-slider');
    const valDisplay = document.getElementById('n-value');

    slider.addEventListener('input', (e) => {
        const n = parseInt(e.target.value);
        valDisplay.textContent = `n = ${n}`;
        updatePlot(n);
    });

    // 初始绘制
    updatePlot(0);

</script>

</body>
</html>
