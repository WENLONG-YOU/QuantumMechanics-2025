<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>《量子力学》课堂随机点名系统</title>
    <style>
        body {
            text-align: center;
            padding: 50px;
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f0f3f5;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 40px;
        }
        #display {
            font-size: 64px;
            margin: 40px 0;
            color: #e67e22;
            min-height: 80px;
            letter-spacing: 3px;
        }
        button {
            padding: 20px 50px;
            font-size: 28px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
        #result {
            font-size: 36px;
            color: #27ae60;
            margin-top: 30px;
            font-weight: bold;
        }
        .container {
            background: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>《量子力学》课堂随机点名系统</h1>
        <div id="display">🎉 准备就绪</div>
        <button onclick="startRandom()" id="startBtn">开始点名</button>
        <div id="result"></div>
    </div>

    <script>
        // 已更新的学生名单
        const students = [
            "凌李杰", "岳晨卓", "王桢皓", "刘宇欣", "陈雨梵", "覃茜", 
            "张水淼", "谢文轩", "周东昊", "吕佳菲扬", "刘晟赫", "乔坤", 
            "刘浥尘", "钱宏宇", "张浩阳", "王晗", "邱子淙", "张林", 
            "张鹤", "杜雨恒", "涂英泓", "刘毅鑫", "王植浩", "宋宇炫", 
            "刘远宁", "张健华", "江荟萱", "王晓颖", "张灵珠", "叶晶", 
            "韩瑾祎", "王彪", "周韦健", "陈振东", "郑康", "林金鸿", 
            "徐文涛", "金昊", "谢炆珂", "张书恺", "杨子旭", "田瑞年", 
            "姜李枭", "李志翔", "刘瑞司", "葛嘉龙", "张子骞", "李嘉豪", 
            "杨树行", "熊建鑫", "吴雷达", "王彦喆", "何嘉睿", "赵晗棋", 
            "施如昊", "李俊成", "邱林洪", "何国庆", "依布拉木江·吾斯曼" 
 
        ];

        let isRunning = false;
        let intervalId;
        let timeoutId;

        function startRandom() {
            if (isRunning) return;

            // 重置状态
            isRunning = true;
            const btn = document.getElementById("startBtn");
            btn.innerHTML = "随机中...";
            btn.disabled = true;
            document.getElementById("result").innerHTML = "";
            
            // 快速随机效果
            let counter = 0;
            intervalId = setInterval(() => {
                const index = Math.floor(Math.random() * students.length);
                document.getElementById("display").innerHTML = students[index];
                counter++;
            }, 80);

            // 5秒后停止
            timeoutId = setTimeout(() => {
                clearInterval(intervalId);
                const selected = document.getElementById("display").innerHTML;
                document.getElementById("result").innerHTML = `🎉 有请 ${selected} 同学上来做题！`;
                btn.innerHTML = "再次点名";
                btn.disabled = false;
                isRunning = false;
            }, 5000);
        }
    </script>
</body>
</html>
